<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; }
</style>
</head>
<body>
<!-- Exact Figma header: 1360px wide, 92px tall, bg-white, px-26 py-28 -->
<div id="navbar" style="
  position: relative;
  width: 1360px;
  height: 92px;
  background: #FFFFFF;
">
  <div style="
    position: absolute;
    left: 0; top: 0;
    width: 1360px;
    height: 92px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 26px;
  ">
    <!-- Logo: 199x33 -->
    <img src="https://www.figma.com/api/mcp/asset/0daf86bd-d3ec-40c5-b133-3264425c8a62"
         alt="Reunimer" width="199" height="33"
         style="display:block; width:199px; height:33px; flex-shrink:0;">

    <!-- Nav links -->
    <div style="
      display: flex;
      gap: 34px;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    ">
      <span style="font-family:'Montserrat',sans-serif; font-weight:600; font-size:12px; letter-spacing:1.44px; text-transform:uppercase; color:#002C41; white-space:nowrap;">groupe</span>
      <span style="font-family:'Montserrat',sans-serif; font-weight:600; font-size:12px; letter-spacing:1.44px; text-transform:uppercase; color:#002C41; white-space:nowrap;">expertises</span>
      <span style="font-family:'Montserrat',sans-serif; font-weight:600; font-size:12px; letter-spacing:1.44px; text-transform:uppercase; color:#002C41; white-space:nowrap;">produits</span>
      <span style="font-family:'Montserrat',sans-serif; font-weight:600; font-size:12px; letter-spacing:1.44px; text-transform:uppercase; color:#002C41; white-space:nowrap;">engagements RSE</span>
      <span style="font-family:'Montserrat',sans-serif; font-weight:600; font-size:12px; letter-spacing:1.44px; text-transform:uppercase; color:#002C41; white-space:nowrap;">actualités</span>
      <span style="font-family:'Montserrat',sans-serif; font-weight:600; font-size:12px; letter-spacing:1.44px; text-transform:uppercase; color:#002C41; white-space:nowrap;">carrières</span>

      <!-- Search icon 14x14 -->
      <img src="https://www.figma.com/api/mcp/asset/7482d340-8f61-42d8-8826-d50e1f828d05"
           width="14" height="14"
           style="display:block; width:14px; height:14px; flex-shrink:0;">

      <!-- FR + chevron -->
      <div style="position:relative; width:31px; height:15px; flex-shrink:0;">
        <span style="font-family:'Montserrat',sans-serif; font-weight:600; font-size:12px; letter-spacing:1.44px; text-transform:uppercase; color:#002C41; white-space:nowrap; position:absolute; left:0; top:0;">FR</span>
        <img src="https://www.figma.com/api/mcp/asset/30cbc470-c50d-497d-b5f8-78336cae60af"
             style="position:absolute; top:33.33%; right:0; width:30%; height:33.33%; display:block;">
      </div>
    </div>
  </div>
</div>
</body>
</html>
